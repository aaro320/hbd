<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Dhanabells!</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #a0d8ff;
            --deep-blue: #05192d;
            --glow-blue: #82ccff;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #103a61 0%, #05192d 100%);
            font-family: 'Great Vibes', cursive;
            overflow: hidden;
            color: white;
        }

        body::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.15;
            z-index: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            padding: 50px 30px;
            border-radius: 50px;
            text-align: center;
            border: 1px solid rgba(160, 216, 255, 0.2);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            width: 320px;
            z-index: 5;
            position: relative;
            opacity: 0;
            animation: entrance 1.2s ease-out forwards, float 6s ease-in-out infinite 1.2s;
        }

        @keyframes entrance {
            0% { transform: scale(0.8) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 { 
            font-size: 3.5rem; 
            margin: 0 0 10px 0;
            color: #ffffff;
            text-shadow: 0 0 15px var(--glow-blue);
            min-height: 4.5rem;
        }

        #status-text { 
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem; 
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 4px;
            display: block; 
            margin-bottom: 25px;
            min-height: 1rem;
        }

        .btn {
            background: rgba(160, 216, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid var(--primary-blue);
            padding: 12px 35px;
            font-size: 1.5rem;
            border-radius: 100px;
            cursor: pointer;
            position: fixed;
            z-index: 100;
            box-shadow: 0 0 20px rgba(160, 216, 255, 0.3);
            top: 70%; 
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: fadeInBtn 0.8s ease forwards 0.5s, breathe 2.5s infinite ease-in-out;
        }

        #retryBtn {
            position: static;
            transform: none;
            display: none;
            margin-top: 20px;
            animation: fadeInBtn 1s ease forwards;
            font-size: 1.2rem;
            padding: 8px 25px;
        }

        @keyframes fadeInBtn { from { opacity: 0; } to { opacity: 1; } }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 15px rgba(160, 216, 255, 0.3); transform: translate(-50%, -50%) scale(1); }
            50% { box-shadow: 0 0 35px rgba(160, 216, 255, 0.7); transform: translate(-50%, -50%) scale(1.1); }
        }

        #birthday-content { display: none; }

        #final-photo {
            width: 260px;
            height: 350px;
            border-radius: 40px;
            border: 2px solid rgba(160, 216, 255, 0.5);
            box-shadow: 0 0 50px rgba(160, 216, 255, 0.4);
            object-fit: cover;
        }

        #birthday-message {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-top: 20px;
            color: #d8e6f1;
            min-height: 3rem;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            z-index: 4;
            animation: fall linear forwards;
        }

        .floating-element {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            animation: floatUp 5s ease-in forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(360deg) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bdayMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="card" id="mainCard">
        <div id="setup-content">
            <h1 id="intro-title"></h1>
            <span id="status-text"></span>
        </div>

        <div id="birthday-content">
            <img src="final.jpg" id="final-photo">
            <h1 id="final-hbd" style="font-size: 3rem; margin-top: 15px;"></h1>
            <span id="final-name" style="font-family:'Montserrat'; letter-spacing: 5px; color:#a0d8ff;"></span>
            <div id="birthday-message"></div>
            <button class="btn" id="retryBtn" onclick="restartGame()">See Again</button>
        </div>
    </div>

    <button class="btn" id="targetBtn" onclick="handleTap()">Tap Me </button>

    <script>
        const photoList = ["d.jpg", "1773573887613.jpg", "1773573884038.jpg", "1773573881975.jpg", "1773573879293.jpg", "final.jpg"];
        let tapCount = 20;
        const music = document.getElementById('bdayMusic');

        function typeWriter(elementId, text, speed = 100) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = "";
            return new Promise(resolve => {
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i);
                        i++;
                        setTimeout(type, speed);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }

        window.onload = async () => {
            initGame();
        };

        async function initGame() {
            const btn = document.getElementById('targetBtn');
            btn.style.display = 'block';
            btn.style.left = (window.innerWidth / 2 - btn.offsetWidth / 2) + 'px';
            btn.style.top = (window.innerHeight / 2 + 150) + 'px';
            
            await typeWriter('intro-title', 'HBD!');
            typeWriter('status-text', 'Unlock the magic (20 taps)', 50);
        }

        function moveButton() {
            const btn = document.getElementById('targetBtn');
            const margin = 100; 
            const maxX = window.innerWidth - btn.offsetWidth - margin;
            const maxY = window.innerHeight - btn.offsetHeight - margin;
            const newX = Math.max(margin, Math.random() * maxX);
            const newY = Math.max(margin, Math.random() * maxY);
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
            btn.style.transform = "translate(0,0) scale(1)"; 
        }

        function handleTap() {
            // Start music on first tap
            if (tapCount === 20) music.play().catch(e => console.log("Music blocked"));

            tapCount--;
            const status = document.getElementById('status-text');
            if (tapCount > 0) {
                status.innerText = `Almost there... ${tapCount}`;
                moveButton();
            } else {
                startFlashSequence();
            }
        }

        function startFlashSequence() {
            const btn = document.getElementById('targetBtn');
            const mainImg = document.getElementById('final-photo');
            btn.style.display = 'none';
            document.getElementById('setup-content').style.display = 'none';
            document.getElementById('birthday-content').style.display = 'block';

            let flashCycles = 0;
            const totalFlashes = 18; 
            const flashInterval = setInterval(() => {
                mainImg.src = photoList[flashCycles % photoList.length];
                flashCycles++;
                if (flashCycles >= totalFlashes) {
                    clearInterval(flashInterval);
                    mainImg.src = photoList[photoList.length - 1];
                    startCelebration();
                }
            }, 150); 
        }

        async function startCelebration() {
            await typeWriter('final-hbd', 'Happy Birthday', 100);
            await typeWriter('final-name', 'DHANABELLS', 150);
            await typeWriter('birthday-message', 'wala lang, tanda mo na sis \nHAHAHAH', 50);
            
            // Show retry button after typing
            document.getElementById('retryBtn').style.display = 'inline-block';

            for(let i=0; i<100; i++) setTimeout(createConfetti, i * 20);
            for(let i=0; i<60; i++) setTimeout(createFloatingElement, i * 150);
        }

        function restartGame() {
            tapCount = 20;
            document.getElementById('birthday-content').style.display = 'none';
            document.getElementById('setup-content').style.display = 'block';
            document.getElementById('retryBtn').style.display = 'none';
            initGame();
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            const colors = ['#a0d8ff', '#82ccff', '#ffffff', '#4682b4'];
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 5000);
        }

        function createFloatingElement() {
            const isPhoto = Math.random() > 0.5;
            const el = isPhoto ? document.createElement('img') : document.createElement('div');
            if (isPhoto) {
                el.src = photoList[Math.floor(Math.random() * photoList.length)];
                el.style.width = (Math.random() * 50 + 70) + 'px';
                el.style.height = el.style.width;
                el.style.borderRadius = '20px';
                el.style.border = '2px solid rgba(255,255,255,0.8)';
                el.style.objectFit = 'cover';
            } else {
                const items = ["💙", "^⁠_⁠^", "💎", "🦋", "🌸"];
                el.innerText = items[Math.floor(Math.random() * items.length)];
                el.style.fontSize = (Math.random() * 20 + 20) + 'px';
            }
            el.className = 'floating-element';
            el.style.left = Math.random() * 95 + 'vw';
            el.style.bottom = '-100px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5500);
        }
    </script>
</body>
</html>
