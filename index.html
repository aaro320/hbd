<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Dhanabells!</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #a0d8ff;
            --deep-blue: #05192d;
            --glow-blue: #82ccff;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Starry Deep Blue Gradient */
            background: radial-gradient(circle at center, #103a61 0%, #05192d 100%);
            font-family: 'Great Vibes', cursive;
            overflow: hidden;
            color: white;
        }

        /* Ambient Sparkles Background */
        body::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            z-index: 1;
        }

        .card {
            /* Frosted Glass Effect */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 30px;
            border-radius: 50px;
            text-align: center;
            border: 1px solid rgba(160, 216, 255, 0.2);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6), 
                        inset 0 0 20px rgba(160, 216, 255, 0.1);
            width: 320px;
            z-index: 5;
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 { 
            font-size: 3.8rem; 
            margin: 0 0 15px 0;
            color: #ffffff;
            text-shadow: 0 0 15px var(--glow-blue), 0 0 30px rgba(130, 204, 255, 0.3);
            letter-spacing: 2px;
        }

        #status-text { 
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem; 
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 4px;
            display: block; 
            margin-bottom: 25px;
            opacity: 0.8;
        }

        /* --- SOFT GLOWING BUTTON --- */
        .btn {
            background: rgba(160, 216, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid var(--primary-blue);
            padding: 12px 35px;
            font-size: 1.5rem;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(160, 216, 255, 0.2);
            position: fixed;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:hover {
            background: rgba(160, 216, 255, 0.3);
            box-shadow: 0 0 30px rgba(160, 216, 255, 0.5);
            transform: scale(1.1);
        }

        #cake-container {
            display: none;
            position: relative;
            width: 100%;
            cursor: crosshair;
        }

        .kawaii-cake {
            width: 100%;
            height: auto;
            border-radius: 30px;
            filter: drop-shadow(0 0 20px rgba(160, 216, 255, 0.3));
            transition: transform 0.3s ease;
        }

        .candle {
            position: absolute;
            font-size: 2.2rem;
            transform: translate(-50%, -100%);
            z-index: 10;
            filter: drop-shadow(0 0 10px gold);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #final-photo {
            display: none;
            width: 260px;
            border-radius: 40px;
            border: 2px solid rgba(160, 216, 255, 0.5);
            margin-top: 15px;
            box-shadow: 0 0 50px rgba(160, 216, 255, 0.4);
            object-fit: cover;
        }

        /* Aesthetic Floating Particles */
        .floating-element {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            animation: floatUp 5s ease-in forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        @keyframes popIn {
            from { transform: translate(-50%, -100%) scale(0); opacity: 0; }
            to { transform: translate(-50%, -100%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1 id="title">HBD!</h1>
        <span id="status-text">Tap the button 20 times...</span>
        
        <div id="cake-container" onclick="placeCandle(event)">
            <img src="Cake.jpg" class="kawaii-cake" id="cakeImg">
            <div id="candle-layer"></div>
        </div>

        <img src="IMG_20260312_071341.jpg" id="final-photo">
    </div>

    <button class="btn" id="targetBtn" onclick="handleTap()">Tap Me ✨</button>

    <script>
        let tapCount = 20;
        let candlesPlaced = 0;
        const btn = document.getElementById('targetBtn');
        const statusText = document.getElementById('status-text');
        const cakeContainer = document.getElementById('cake-container');
        const candleLayer = document.getElementById('candle-layer');
        const finalPhoto = document.getElementById('final-photo');
        const photoSource = "IMG_20260312_071341.jpg";

        window.onload = () => {
            btn.style.left = (window.innerWidth / 2 - btn.offsetWidth / 2) + 'px';
            btn.style.top = (window.innerHeight / 2 + 150) + 'px';
        };

        function moveButton() {
            const margin = 100; 
            const maxX = window.innerWidth - btn.offsetWidth - margin;
            const maxY = window.innerHeight - btn.offsetHeight - margin;
            btn.style.left = Math.max(margin, Math.random() * maxX) + 'px';
            btn.style.top = Math.max(margin, Math.random() * maxY) + 'px';
        }

        function handleTap() {
            tapCount--;
            if (tapCount > 0) {
                statusText.innerText = `Almost there... ${tapCount}`;
                moveButton();
            } else {
                startCakePhase();
            }
        }

        function startCakePhase() {
            btn.style.display = 'none';
            document.getElementById('title').innerText = "Make a Wish";
            statusText.innerText = "Light the 5 candles";
            cakeContainer.style.display = 'block';
        }

        function placeCandle(event) {
            if (candlesPlaced < 5) {
                candlesPlaced++;
                const rect = cakeContainer.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;

                const candle = document.createElement('div');
                candle.className = 'candle';
                candle.innerText = "🕯️";
                candle.style.left = x + 'px';
                candle.style.top = y + 'px';
                candleLayer.appendChild(candle);

                if (candlesPlaced === 5) {
                    setTimeout(revealFinalSurprise, 1000);
                }
            }
        }

        function revealFinalSurprise() {
            document.getElementById('title').innerText = "Happy Birthday";
            statusText.innerText = "Dhanabells";
            cakeContainer.style.display = 'none';
            finalPhoto.style.display = 'inline-block';
            
            for(let i=0; i<60; i++) {
                setTimeout(createCelebration, i * 120);
            }
        }

        function createCelebration() {
            const isPhoto = Math.random() > 0.45;
            const el = isPhoto ? document.createElement('img') : document.createElement('div');
            
            if (isPhoto) {
                el.src = photoSource;
                el.style.width = (Math.random() * 60 + 80) + 'px';
                el.style.height = el.style.width;
                el.style.borderRadius = '30px';
                el.style.border = '2px solid rgba(255,255,255,0.8)';
                el.style.objectFit = 'cover';
                el.style.boxShadow = '0 10px 20px rgba(0,0,0,0.3)';
            } else {
                // Aesthetic blue elements
                const items = ["💙", "✨", "❄️", "💎", "🦋"];
                el.innerText = items[Math.floor(Math.random() * items.length)];
                el.style.fontSize = (Math.random() * 20 + 20) + 'px';
            }

            el.className = 'floating-element';
            el.style.left = Math.random() * 95 + 'vw';
            el.style.bottom = '-100px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5500);
        }
    </script>
</body>
</html>
